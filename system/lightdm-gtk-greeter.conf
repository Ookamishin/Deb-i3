#
# i3-cyberpunk-dotfiles - LightDM GTK Greeter (Cyberpunk theme)
# Installed to /etc/lightdm/lightdm-gtk-greeter.conf
#
[greeter]
# Background: cyberpunk wallpaper (fallback color = void black)
background = /usr/share/backgrounds/cyberpunk.png
background-color = #0a0e14

# GTK / icons / cursor (set via lxappearance)
theme-name = Adwaita-dark
icon-theme-name = Papirus-Dark
cursor-theme-name = Adwaita

# Font
font-name = JetBrainsMono Nerd Font 11

# Login window position
position = 50%,center 50%,center
default-user-image = #avatar-default
xft-antialias = true
xft-hintstyle = hintfull
xft-rgba = rgb

# Top panel
clock-format = %a %d %b  %H:%M
indicators = ~host;~spacer;~clock;~spacer;~session;~language;~a11y;~power

# Aesthetic
hide-user-image = false
round-user-image = true
highlight-logo = false
highlight-active-user = false
