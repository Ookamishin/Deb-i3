# =============================================================
#  picom — Cyberpunk compositor
#  dual_kawase blur · dramatic shadows · rounded corners
#  Hyper-V: use "xrender" backend if glx flickers
# =============================================================

backend = "glx";
vsync = true;

# --- Shadows (deep neon glow) ---
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.55;
shadow-offset-x = -14;
shadow-offset-y = -14;
shadow-red = 0.0;
shadow-green = 0.94;
shadow-blue = 1.0;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'i3-frame'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Fading ---
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# --- Transparency / opacity (layered glass effect) ---
inactive-opacity = 0.88;
active-opacity = 0.96;
frame-opacity = 0.92;
inactive-opacity-override = false;

opacity-rule = [
  "85:class_g = 'kitty' && !focused",
  "92:class_g = 'kitty' && focused",
  "100:class_g = 'firefox'",
  "100:fullscreen"
];

# --- Rounded corners ---
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

# --- Blur (dual_kawase for that holographic glass) ---
blur:
{
  method = "dual_kawase";
  strength = 7;
  background = false;
  background-frame = false;
  background-fixed = false;
};
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- General ---
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.92; };
  dropdown_menu = { opacity = 0.92; };
};
