# =============================================================
#  picom — ZERO GPU MODE
#  No blur · No shadows · No fading · No transparency
#  Only rounded corners (CPU-cost negligible)
#  Hyper-V: comentar picom en i3/config para 0% GPU real
# =============================================================

backend = "xrender";
vsync = false;

# --- Shadows: OFF ---
shadow = false;

# --- Fading: OFF ---
fading = false;

# --- Transparency: OFF (all solid) ---
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity-override = false;

# --- Corners (only visual, CPU-cost) ---
corner-radius = 6;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

# --- Blur: OFF ---
blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

# --- General ---
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

wintypes:
{
  tooltip = { fade = false; shadow = false; opacity = 1.0; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
};
