# =============================================================
#  picom — Cyberpunk LIGHTNING (optimized for Hyper-V VM)
#  xrender backend · mild blur · crisp shadows · low GPU cost
# =============================================================

# xrender: much lighter on Hyper-V synthetic GPU than glx
backend = "xrender";
vsync = false;

# --- Shadows ---
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.4;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-red = 0.0;
shadow-green = 0.94;
shadow-blue = 1.0;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- Fading ---
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 4;

# --- Opacity (glass-lite) ---
inactive-opacity = 0.93;
active-opacity = 0.98;
frame-opacity = 0.95;
inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'kitty' && !focused",
  "95:class_g = 'kitty' && focused",
  "100:fullscreen"
];

# --- Rounded corners ---
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

# --- Blur (mild, GPU-friendly) ---
blur:
{
  method = "dual_kawase";
  strength = 3;
};
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- General ---
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.92; };
  dropdown_menu = { opacity = 0.92; };
};
