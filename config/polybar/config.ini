; =============================================================
;  Polybar — Cyberpunk Neon (diseño final)
;  Powerline segments · Colores por sección · Iconos Nerd
; =============================================================

[colors]
background = #0a0e14
background-alt = #1a1b2e
foreground = #c0caf5
foreground-alt = #565f89
primary = #00f0ff
secondary = #ff007f
tertiary = #7c3aed
alert = #ff0040
warning = #ffd700

[bar/main]
width = 100%
height = 30pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt
border-size = 0pt

padding-left = 1
padding-right = 1
module-margin = 0

separator = ""
separator-foreground = ${colors.foreground-alt}

font-0 = JetBrainsMono Nerd Font:style=Medium:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=13;3

modules-left = i3
modules-center = date
modules-right = pulseaudio memory cpu wlan tray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; ---- Workspaces ----
[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
index-sort = true

label-focused =  %index%  
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.primary}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused =  %index%  
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-visible =  %index%  
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2

label-urgent =  %index%  
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

; ---- System tray ----
[module/tray]
type = internal/tray
format-margin = 4pt
tray-spacing = 8pt
tray-padding = 2

; ---- Audio ----
[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = ""
label-muted-foreground = ${colors.foreground-alt}
click-right = pavucontrol
click-middle = pactl set-sink-mute @DEFAULT_SINK@ toggle

; ---- Memory ----
[module/memory]
type = internal/memory
interval = 3
format-prefix = ""
format-prefix-foreground = ${colors.tertiary}
label = %percentage_used:2%%
label-foreground = ${colors.foreground}
click-left = btop

; ---- CPU ----
[module/cpu]
type = internal/cpu
interval = 3
format-prefix = ""
format-prefix-foreground = ${colors.secondary}
label = %percentage:2%%
label-foreground = ${colors.foreground}
click-left = btop

; ---- WiFi ----
[module/wlan]
type = internal/network
interface-type = wireless
interval = 5
format-connected-prefix = ""
format-connected-prefix-foreground = ${colors.primary}
label-connected = %essid%
label-connected-foreground = ${colors.foreground}
format-disconnected =
label-disconnected = ""
label-disconnected-foreground = ${colors.foreground-alt}
click-left = nm-connection-editor

; ---- Date ----
[module/date]
type = internal/date
interval = 1
date = %H:%M
label =  %date%  
label-foreground = ${colors.foreground}
format-prefix = ""
format-prefix-foreground = ${colors.primary}
click-left = gnome-calendar || cal

[settings]
screenchange-reload = true
pseudo-transparency = true
