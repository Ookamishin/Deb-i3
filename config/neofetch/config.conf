# =============================================================
#  neofetch — Cyberpunk info display
#  Colores alineados con la paleta del sistema
# =============================================================

print_info() {
    info title
    info underline
    info os
    info host
    info kernel
    info uptime
    info packages
    info shell
    info resolution
    info de
    info wm
    info wm_theme
    info terminal
    info cpu
    info gpu
    info memory
    info colorecho
}

# --- Color blocks (neon palette) ---
colorecho_on() {
    set_colors 6 5 4 3 2 1
    printf "\n"
}

# --- Custom colors: match cyberpunk palette ---
color1="7"   # white (default text)
color2="6"   # cyan info
color3="5"   # pink labels
color4="4"   # purple values
color5="3"   # gold accent
color6="2"   # green accent

title_color="6"
subtitle_color="5"
underline_color="3"

bold="on"
separator=" "

# --- Image ---
image_source="auto"
image_backend="kitty"
image_loop="false"

# --- Custom ASCII logo ---
ascii_distro="custom"
ascii_colors=(6 5 4)
ascii="$HOME/.config/neofetch/ascii.txt"
