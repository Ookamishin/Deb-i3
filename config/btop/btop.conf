# =============================================================
#  btop — Cyberpunk system monitor
#  Theme: cyberpunk (loaded from themes/cyberpunk.theme)
# =============================================================

color_theme = "cyberpunk"
theme_background = false

# --- Layout ---
box_default = "cpu cpu:1:0,mem cpu:1:1,net cpu:2:0,proc cpu:2:1"
shown_boxes = "cpu mem net proc"
update_ms = 2000

# --- CPU ---
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = true
cpu_single_graph = false

# --- Mem ---
mem_graph_upper = "doughnut"
mem_graph_lower = "used"
mem_invert_lower = false

# --- Net ---
net_iface = "auto"
net_sync = true

# --- Proc ---
proc_sorting = "cpu direct"
proc_filter = ""
proc_tree = false
proc_depth = 3

# --- Temp ---
show_temps = false
check_temp = false
