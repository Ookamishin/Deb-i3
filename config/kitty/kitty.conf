# =============================================================
#  kitty - Cyberpunk Neon (Tokyo Night variant)
# =============================================================

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window ---
window_padding_width 12
background_opacity 0.92
confirm_os_window_close 0
enable_audio_bell no
cursor_shape beam
scrollback_lines 10000

# --- Tabs ---
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# =============================================================
#  Cyberpunk Neon color scheme
#  Based on Tokyo Night Storm + custom neons
# =============================================================
foreground            #c0caf5
background            #0a0e14
selection_foreground  #0a0e14
selection_background  #7c3aed

url_color             #00f0ff
cursor                #00f0ff

active_border_color   #00f0ff
inactive_border_color #1a2430

active_tab_foreground   #0a0e14
active_tab_background   #00f0ff
inactive_tab_foreground #565f89
inactive_tab_background #111820

# black (dark surfaces)
color0   #111820
color8   #1a2430
# red (neon)
color1   #ff0040
color9   #ff3355
# green (matrix)
color2   #00ff41
color10  #33ff66
# yellow (gold)
color3   #ffd700
color11  #ffea80
# blue (ocean)
color4   #0088ff
color12  #44aaff
# magenta (pink neon)
color5   #ff007f
color13  #ff44aa
# cyan (hologram)
color6   #00f0ff
color14  #44f5ff
# white
color7   #c0caf5
color15  #e0e8ff
