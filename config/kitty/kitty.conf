# =============================================================
#  kitty - Tokyo Night Storm
#  Paleta probada · legible · cohesive · cyberpunk-ready
# =============================================================

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

window_padding_width 10
background_opacity 1.0
confirm_os_window_close 0
enable_audio_bell no
cursor_shape beam
scrollback_lines 10000

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# =============================================================
#  Tokyo Night Storm — https://github.com/folke/tokyonight.nvim
#  Background void #0a0e14 (mas oscuro que el original #1a1b26)
# =============================================================
foreground            #c0caf5
background            #0a0e14
selection_foreground  #0a0e14
selection_background  #2f3b5c

url_color             #7dcfff
cursor                #c0caf5

active_border_color   #7dcfff
inactive_border_color #1a1b2e

active_tab_foreground   #0a0e14
active_tab_background   #7dcfff
inactive_tab_foreground #565f89
inactive_tab_background #0a0e14

# black — dark surfaces
color0   #1d202f
color8   #1a1b2e
# red — desaturated coral
color1   #f7768e
color9   #ff9eae
# green — muted lime
color2   #9ece6a
color10  #b8e08a
# yellow — muted gold
color3   #e0af68
color11  #e8c888
# blue — periwinkle
color4   #7aa2f7
color12  #a0b8ff
# magenta — lavender
color5   #bb9af7
color13  #d0b8ff
# cyan — sky
color6   #7dcfff
color14  #a0e0ff
# white
color7   #c0caf5
color15  #e0e8ff
